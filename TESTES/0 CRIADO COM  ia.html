<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Cadastro</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .campo { margin-bottom: 15px; display: flex; flex-direction: column; width: 300px; }
        label { font-weight: bold; margin-bottom: 5px; }
        input, select { padding: 8px; font-size: 14px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px; background-color: #007BFF; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>

    <h2>Formulário de Cadastro</h2>

    <form action="#" method="POST">
        
        <div class="campo">
            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome" autocomplete="name" required placeholder="Digite seu nome completo">
        </div>

        <div class="campo">
            <label for="endereco">Endereço:</label>
            <input type="text" id="endereco" name="endereco" autocomplete="address-line1" required placeholder="Rua, Avenida, etc.">
        </div>

        <div class="campo">
            <label for="numero">Número da Casa:</label>
            <input type="text" id="numero" name="numero" autocomplete="address-line2" required placeholder="Ex: 123 ou S/N">
        </div>

        <div class="campo">
            <label for="email">E-mail:</label>
            <input type="email" id="email" name="email" autocomplete="email" required placeholder="nome@email.com">
        </div>

        <div class="campo">
            <label for="telefone">Telefone:</label>
            <input type="tel" id="telefone" name="telefone" autocomplete="tel" required placeholder="(00) 00000-0000">
        </div>

        <div class="campo">
            <label for="experiencia">Tempo de Experiência:</label>
            <select id="experiencia" name="experiencia" required>
                <option value="" disabled selected>Selecione uma opção</option>
                <option value="menos-1">Menos de 1 ano</option>
                <option value="1-3">1 a 3 anos</option>
                <option value="3-5">3 a 5 anos</option>
                <option value="mais-5">Mais de 5 anos</option>
            </select>
        </div>

        <button type="submit">Enviar Cadastro</button>

    </form>

</body>
</html>

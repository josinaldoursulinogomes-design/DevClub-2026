

<!-- Elementos Estruturais -->

<!-- a div é um elemento estrutural que é usado para agrupar outros elementos e aplicar estilos ou scripts a eles.
 Ele não tem um significado semântico específico, mas é útil para organizar o conteúdo em blocos.
 A DIV FUNCIONA COM UMA CAIXA DE PARA ORGANIZAR CONTEÚDO.
 -->

 <!-- A TAG span -->
<!-- A tag span é um elemento estrutural que é usado para agrupar um trecho específico de texto ou conteúdo dentro de um elemento maior.
 Ela é frequentemente usada para aplicar estilos ou scripts a uma parte específica do conteúdo, sem afetar o restante do elemento.
 A tag span é um elemento em linha, o que significa que não cria uma nova linha no layout da página. -->

 <!-- O SPAN SERVE PARA DIZER AO CSS QUE EU QUERO ESTILIZAR UMA PARTE ESPECÍFICA DO TEXTO -->
 
 
 <p>Este é um parágrafo com um <span>trecho em destaque</span>.</p>


 <div>

<h1>Titulo</h1>
<p>Paragrafo</p>

</div>

<!-- O header é um elemento estrutural que representa a seção de introdução de um documento ou seção. 
 Ele geralmente contém o título, logotipo, navegação e outras informações introdutórias.
 -->

 <header>
    <h1>Família Ursulino</h1>
    
    <nav> <!-- O nav é um elemento estrutural que representa uma seção de navegação em um documento.
        Ele é usado para agrupar links de navegação, como menus ou barras de navegação, que permitem
        aos usuários navegar pelo site ou aplicativo. O nav ajuda a organizar a estrutura do conteúdo
        e facilita a navegação para os usuários. 
        -->
        <ul>
            <li><a href="#">Início</a>
            </li><li><a href="#">Sobre</a></li>
            <li><a href="#">Contato</a></li>
        </ul>
    </nav>

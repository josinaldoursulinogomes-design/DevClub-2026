<!-- O atributo alt é usado para fornecer uma descrição alternativa da imagem,
 que é exibida quando a imagem não pode ser carregada ou para leitores de tela
 usados por pessoas com deficiência visual. -->

 alt="Rute e Ester"
 width="300"
 height="400"
 />

<!-- O elemento figure é usado para agrupar uma imagem e sua legenda, que é fornecida pelo elemento figcaption. 
 Ele é útil para associar a legenda diretamente à imagem e para melhorar a acessibilidade do conteúdo. -->  

<figure>
<img src="../Rute e ester.jpeg" alt="Rute e Ester" width="300" height="400"/>
<figcaption>Fotos da Rute e da Ester</figcaption>
</figure>

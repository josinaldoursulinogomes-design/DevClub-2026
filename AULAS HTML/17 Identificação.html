<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identificação</title>
    <style>
        body { 
            font-family: sans-serif; 
            background-color: #f0f2f5; 
            text-align: center; 
            padding: 20px; 
        }

        .container { 
            max-width: 600px; 
            margin: 0 auto 30px auto; /* O 30px substitui o <br> com elegância */
            padding: 100px; 
            border-radius: 80px; 
            box-shadow: 0 10px 10px rgba(47, 221, 4, 0.616); 
        }

        /* Variações de estilo específicas para cada container */
        .container.verde { 
            background: rgb(151, 228, 168); 
        }
        .container.verde h1 { color: #be0a28c0; }
        .container.verde p { color: #fcfcfc; }

        .container.escuro { 
            background: rgba(8, 15, 10, 0.404); 
        }
        .container.escuro h2 { color: #27db03d2; }
        .container.escuro p { color: #10110fce; }
    </style>
</head>
<body>

    <div class="container verde">
        <h1>Identificação</h1>
        <p>Este é um exemplo de código limpo e organizado.</p>
    </div>

    <div class="container escuro">
        <h2>Identificação</h2>
        <p>Este é um exemplo de código limpo e organizado.</p>
    </div>

</body>
</html>
